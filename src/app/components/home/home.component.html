<section class="space-sm flush-with-above">
  <div class="container-principal">
    <div class="tag">Ultimas propiedades</div>
    <!-- <div class="tasaciones"> -->
    <div class="col-lg-3"  >
      <div data-sticky="top">
        <div class="card card-borderless bg-secondary">
          <a class="card-body" data-toggle="modal" data-target="#modal-tasaciones">
            <div class="d-flex mb-3">
              <img alt="Image" src="/assets/img/chalita/trebol-solo-no-fondo.png" />
              <span class="title-decorative">Tasaciones Inmobiliarias</span>
            </div>
            <!-- <span class="h6">A robust suite of styled elements and pages</span> -->
          </a>
        </div>
        <!-- end card -->

      </div>
      <!-- end of sticky-->
    </div>
    <!--end of col-->
  </div>
  <!-- </div> -->

  <div class="container">


    <ul class="row feature-list feature-list-sm">





      <li *ngFor="let property of properties" class="col-12 col-md-6 col-lg-4">



        <div class="w-full sm:w-1/2 md:w-1/3 flex flex-col p-3">
          <div class="bg-white rounded-lg shadow-lg overflow-hidden flex-1 flex flex-col">
            <div class="bg-cover h-48"
              style="background-image: url(https://images.unsplash.com/photo-1523978591478-c753949ff840?w=900);"></div>
            <div class="p-4 flex-1 flex flex-col">
              <h3 class="mb-4 text-2xl">Estado: {{ property.state }}</h3>
              <div class="mb-4 text-grey-darker text-sm flex-1">
                <p class="card-text">Código: {{ property.code }}</p>
                <p>
                  Localidad: {{ property.location }} <br>
                  Superficie Lote: {{ property.surfaceTotal }} <br>
                  Tipo: {{ property.kindProperty }}
                </p>
                <p class="biography">
                  {{ property.description }}
                </p>
              </div>
              <a href="#">
                <img class="card-img-top" src="{{ property.images[0] }}" alt="Card image cap">
              </a>
              <div class="dropup">
                <button class="btn btn-sm btn-outline-primary" type="button" id="SidekickButton" aria-expanded="false"
                  [routerLink]="['/details' , property.id ]">
                  <!-- <i class="icon-dots-three-horizontal"></i> -->
                  <span>Ver mas</span>
                </button>
                <!-- <div class="dropdown-menu dropdown-menu-sm" aria-labelledby="SidekickButton">
                                                    <a class="dropdown-item" [routerLink]="['/details' , property.id ]">Ver mas</a>
                
                                                   
                                                </div> -->
              </div>
            </div>
          </div>
        </div>


      </li>
      <!--end of col-->



    </ul>
    <!--end of ul-->




  </div>


  <app-waiting *ngIf="properties.length == 0"></app-waiting>

</section>

<app-about></app-about>
<app-parallax-comp></app-parallax-comp>
